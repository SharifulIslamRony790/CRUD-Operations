{% extends 'base.html' %}


{% block title %}Delete Student{% endblock %}


{% block body %}

        <div class="container mt-5">

                    <div class="card" style="width: 50rem; background-color: antiquewhite;">
                    <div class="card-body">
                        <h3 class="text-danger">Confirm Delete</h3>
            <p>Are you sure you want to delete <strong>{{ student.name }}</strong>?</p>


            <table class="table">
                <tr>
                    <th>Name:</th>
                    <td>{{ student.name }}</td>
                </tr>
                <tr>
                    <th>Roll:</th>
                    <td>{{ student.roll }}</td>
                </tr>
                <tr>
                    <th>School:</th>
                    <td>{{ student.school }}</td>
                </tr>
            </table>

                        <form action="" method="POST" >
                            {% csrf_token %}

                            
                                <div class="form-group mb-3">
                                    <button type="submit" class="btn btn-danger btn-block" style="background-color: chocolate;">Yes, Delete</button>
                                    <a href="{% url 'student_list' %}" class="btn btn-secondary">Cancel</a>
                                </div>
                                        </form>

                    </div>
                    </div>

                    </div>
                </div>
            </div>

        {% endblock %}
